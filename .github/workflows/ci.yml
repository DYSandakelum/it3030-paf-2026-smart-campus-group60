name: Smart Campus CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - develop
      - main

jobs:
  backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'oracle'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Create application.yml for CI
        run: |
          mkdir -p backend/src/main/resources
          cat > backend/src/main/resources/application.yml << 'EOF'
          server:
            port: 8080
          spring:
            data:
              mongodb:
                uri: ${{ secrets.MONGODB_URI }}
                database: smart_campus
            security:
              oauth2:
                client:
                  registration:
                    google:
                      client-id: ${{ secrets.GOOGLE_CLIENT_ID }}
                      client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
                      scope:
                        - email
                        - profile
          app:
            jwt:
              secret: ${{ secrets.JWT_SECRET }}
              expiration: 86400000
          EOF

      - name: Build backend
        run: cd backend && mvn clean compile -q

      - name: Run backend tests
        run: cd backend && mvn test -q

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Check if frontend exists
        id: check_frontend
        run: |
          if [ -d "frontend" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check_frontend.outputs.exists == 'true'
        run: cd frontend && npm ci

      - name: Build frontend
        if: steps.check_frontend.outputs.exists == 'true'
        run: cd frontend && npm run build